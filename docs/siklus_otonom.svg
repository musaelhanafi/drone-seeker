<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="560" fill="#ffffff" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#1f2328" font-size="20" font-weight="700" letter-spacing="1">SIKLUS OPERASIONAL OTONOM — AUTO MODE</text>
  <line x1="120" y1="52" x2="780" y2="52" stroke="#d0d7de" stroke-width="1"/>

  <!-- Ground line -->
  <line x1="60" y1="460" x2="840" y2="460" stroke="#8c959f" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="870" y="464" fill="#57606a" font-size="11">GND</text>

  <!-- ===== TRAPEZOID FLIGHT PATH ===== -->
  <!-- Filled trapezoid (translucent) -->
  <polygon points="140,460 260,180 620,180 800,460"
           fill="url(#trapGrad)" opacity="0.18"/>

  <!-- Gradient def -->
  <defs>
    <linearGradient id="trapGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f78166"/>
      <stop offset="50%"  stop-color="#79c0ff"/>
      <stop offset="100%" stop-color="#ff7b72"/>
    </linearGradient>
    <linearGradient id="cruiseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#56d364"/>
      <stop offset="100%" stop-color="#79c0ff"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#79c0ff"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f78166"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff7b72"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- FASE 1: Take Off — left slanted edge -->
  <line x1="140" y1="460" x2="258" y2="184"
        stroke="#f78166" stroke-width="3.5" stroke-linecap="round"
        marker-end="url(#arrowOrange)" filter="url(#glow)"/>

  <!-- FASE 2: Cruise — top horizontal edge -->
  <line x1="260" y1="180" x2="618" y2="180"
        stroke="url(#cruiseGrad)" stroke-width="3.5" stroke-linecap="round"
        marker-end="url(#arrowBlue)" filter="url(#glow)"/>

  <!-- Waypoint markers on cruise -->
  <circle cx="340" cy="180" r="5" fill="#56d364" opacity="0.9"/>
  <circle cx="430" cy="180" r="5" fill="#56d364" opacity="0.9"/>
  <circle cx="520" cy="180" r="5" fill="#56d364" opacity="0.9"/>
  <!-- waypoint labels -->
  <text x="340" y="165" text-anchor="middle" fill="#56d364" font-size="10">WP1</text>
  <text x="430" y="165" text-anchor="middle" fill="#56d364" font-size="10">WP2</text>
  <text x="520" y="165" text-anchor="middle" fill="#56d364" font-size="10">WP3</text>

  <!-- FASE 3: Terminal — right slanted edge (dashed = seeker control) -->
  <line x1="620" y1="180" x2="795" y2="456"
        stroke="#ff7b72" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="10,5"
        marker-end="url(#arrowRed)" filter="url(#glow)"/>

  <!-- ===== NODES ===== -->

  <!-- Launch point -->
  <circle cx="140" cy="460" r="10" fill="#f78166" filter="url(#glow)"/>
  <text x="140" y="490" text-anchor="middle" fill="#f78166" font-size="12" font-weight="600">LAUNCH</text>

  <!-- Cruise start -->
  <circle cx="260" cy="180" r="8" fill="#56d364" filter="url(#glow)"/>

  <!-- Seeker handoff point -->
  <circle cx="620" cy="180" r="10" fill="#d2a8ff" filter="url(#glow)"/>
  <text x="620" y="162" text-anchor="middle" fill="#d2a8ff" font-size="11" font-weight="600">SEEKER ON</text>

  <!-- Target impact -->
  <circle cx="800" cy="460" r="12" fill="#ff7b72" filter="url(#glow)"/>
  <text x="800" y="492" text-anchor="middle" fill="#ff7b72" font-size="12" font-weight="700">TARGET</text>
  <!-- Cross on target -->
  <line x1="792" y1="452" x2="808" y2="468" stroke="#0d1117" stroke-width="2"/>
  <line x1="808" y1="452" x2="792" y2="468" stroke="#0d1117" stroke-width="2"/>

  <!-- ===== PHASE LABEL BOXES ===== -->

  <!-- FASE 1 box -->
  <rect x="60" y="270" width="150" height="90" rx="10" fill="#f6f8fa" stroke="#f78166" stroke-width="1.5"/>
  <rect x="60" y="270" width="150" height="24" rx="10" fill="#f78166" opacity="0.85"/>
  <rect x="60" y="282" width="150" height="12" fill="#f78166" opacity="0.85"/><!-- square bottom of top rounded rect -->
  <text x="135" y="287" text-anchor="middle" fill="#0d1117" font-size="12" font-weight="700">FASE 1 — TAKE OFF</text>
  <text x="135" y="308" text-anchor="middle" fill="#1f2328" font-size="11">Mode: AUTO</text>
  <text x="135" y="324" text-anchor="middle" fill="#1f2328" font-size="11">Thrust → climb</text>
  <text x="135" y="340" text-anchor="middle" fill="#57606a" font-size="10">Bungee / catapult launch</text>
  <!-- connector line to path -->
  <line x1="135" y1="270" x2="190" y2="350" stroke="#f78166" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- FASE 2 box -->
  <rect x="355" y="80" width="170" height="90" rx="10" fill="#f6f8fa" stroke="#56d364" stroke-width="1.5"/>
  <rect x="355" y="80" width="170" height="24" rx="10" fill="#56d364" opacity="0.85"/>
  <rect x="355" y="92" width="170" height="12" fill="#56d364" opacity="0.85"/>
  <text x="440" y="97" text-anchor="middle" fill="#0d1117" font-size="12" font-weight="700">FASE 2 — CRUISE</text>
  <text x="440" y="118" text-anchor="middle" fill="#1f2328" font-size="11">Mode: AUTO</text>
  <text x="440" y="134" text-anchor="middle" fill="#1f2328" font-size="11">Waypoint navigation</text>
  <text x="440" y="150" text-anchor="middle" fill="#57606a" font-size="10">ArduPlane GCS waypoints</text>
  <!-- connector -->
  <line x1="440" y1="170" x2="440" y2="180" stroke="#56d364" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- FASE 3 box -->
  <rect x="680" y="270" width="165" height="110" rx="10" fill="#f6f8fa" stroke="#ff7b72" stroke-width="1.5"/>
  <rect x="680" y="270" width="165" height="24" rx="10" fill="#ff7b72" opacity="0.85"/>
  <rect x="680" y="282" width="165" height="12" fill="#ff7b72" opacity="0.85"/>
  <text x="762" y="287" text-anchor="middle" fill="#0d1117" font-size="12" font-weight="700">FASE 3 — TERMINAL</text>
  <text x="762" y="308" text-anchor="middle" fill="#1f2328" font-size="11">Mode: TRACKING</text>
  <text x="762" y="324" text-anchor="middle" fill="#1f2328" font-size="11">HSV pink detection</text>
  <text x="762" y="340" text-anchor="middle" fill="#1f2328" font-size="11">CamShift tracking</text>
  <text x="762" y="356" text-anchor="middle" fill="#57606a" font-size="10">TRACKING_MESSAGE(ex,ey) → FC</text>
  <!-- connector -->
  <line x1="730" y1="270" x2="710" y2="220" stroke="#ff7b72" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- ===== ALTITUDE AXIS ===== -->
  <line x1="55" y1="100" x2="55" y2="470" stroke="#d0d7de" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="52" y="95" text-anchor="middle" fill="#57606a" font-size="11">ALT</text>
  <text x="52" y="186" text-anchor="end" fill="#57606a" font-size="10">Cruise</text>
  <line x1="53" y1="180" x2="58" y2="180" stroke="#8c959f" stroke-width="1"/>
  <text x="52" y="464" text-anchor="end" fill="#57606a" font-size="10">0 m</text>

  <!-- ===== LEGEND ===== -->
  <rect x="280" y="490" width="340" height="52" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <line x1="300" y1="510" x2="330" y2="510" stroke="#f78166" stroke-width="2.5"/>
  <text x="335" y="514" fill="#57606a" font-size="11">Flight Controller</text>
  <line x1="420" y1="510" x2="450" y2="510" stroke="#56d364" stroke-width="2.5"/>
  <text x="455" y="514" fill="#57606a" font-size="11">Waypoint GPS</text>
  <line x1="300" y1="530" x2="330" y2="530" stroke="#ff7b72" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="335" y="534" fill="#57606a" font-size="11">Seeker</text>
  <circle cx="438" cy="530" r="5" fill="#d2a8ff"/>
  <text x="448" y="534" fill="#57606a" font-size="11">Transition Point</text>

</svg>
